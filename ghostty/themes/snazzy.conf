# ==============================================
# SNAZZY THEME - Bold & Vibrant
# ==============================================
# Perfect for: Expressive coding, vivid syntax highlighting, standout aesthetics
# Colors: Bright primaries on dark background, punchy accents

# Core Theme - Use built-in Snazzy
theme = Snazzy

# Typography
font-family = JetBrains Mono
font-size = 15
font-thicken = true

# Window Styling - CORRECTED OPTIONS
window-padding-x = 12
window-padding-y = 8
window-decoration = true

# Cursor
cursor-style = bar
cursor-opacity = 1.0

# Visual Polish
minimum-contrast = 1.1

# Selection - CORRECTED: Using valid hex colors
selection-background = #4e5173

# Shell Integration
shell-integration = fish
macos-option-as-alt = true

# User Preferences
keybind = shift+enter=text:\x1b\r
keybind = cmd+c=copy_to_clipboard
keybind = cmd+v=paste_from_clipboard

# AI NOTES FOR FUTURE MODIFICATION:
# - Snazzy uses bold, saturated colors on a deep navy background (#282a36)
# - High color contrast makes it great for demos and presentations
# - Similar background to Dracula family but with punchier foreground colors
# - Selection color 4e5173 complements the Snazzy palette
# - Works well with any monospace font; ligature fonts enhance the look